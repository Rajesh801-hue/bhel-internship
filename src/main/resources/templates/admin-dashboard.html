<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .navbar{
            background:#003366;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark">
    <div class="container">

        <span class="navbar-brand">
            BHEL Admin Dashboard
        </span>

        <a href="/logout" class="btn btn-danger">
            Logout
        </a>

    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h3>Internship Applications</h3>

        <hr>

        <div class="table-responsive">

            <table class="table table-bordered table-striped">

                <thead class="table-dark">

                <tr>
                    <th>Name</th>
                    <th>Institute</th>
                    <th>Roll No</th>
                    <th>Branch</th>
                    <th>Gender</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Year</th>
                    <th>Course</th>
                    <th>Duration</th>
                    <th>Progress</th>
                    <th>Score</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="app : ${applications}">

                    <td th:text="${app.name}"></td>
                    <td th:text="${app.instituteName}"></td>
                    <td th:text="${app.rollNo}"></td>
                    <td th:text="${app.branch}"></td>
                    <td th:text="${app.gender}"></td>
                    <td th:text="${app.studentEmail}"></td>
                    <td th:text="${app.phone}"></td>
                    <td th:text="${app.year}"></td>
                    <td th:text="${app.course}"></td>
                    <td th:text="${app.duration}"></td>

                    <td>
                        <span th:text="${app.progress + '%'}"></span>
                    </td>

                    <td th:text="${app.assessmentScore}"></td>

                    <td th:text="${app.status}"></td>

                    <td>

                        <form th:action="@{/approve/{id}(id=${app.id})}"
                              method="post"
                              style="display:inline;">

                            <button class="btn btn-success btn-sm">
                                Approve
                            </button>

                        </form>

                        <form th:action="@{/reject/{id}(id=${app.id})}"
                              method="post"
                              style="display:inline;">

                            <button class="btn btn-danger btn-sm">
                                Reject
                            </button>

                        </form>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
