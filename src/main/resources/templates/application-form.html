<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>BHEL Internship Application</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .card{
            border:none;
            border-radius:10px;
        }

        .header{
            text-align:center;
            margin-bottom:30px;
        }

        .header h2{
            color:#003366;
            font-weight:bold;
        }

        .header p{
            color:gray;
        }
    </style>
</head>

<body>

<div class="container mt-5 mb-5">

    <div class="card shadow p-5">

        <div class="header">

            <h2>
                APPLICATION FORM FOR TRAINING AT BHEL
            </h2>

            <p>
                (Internship / Vocational Training Program)
            </p>

        </div>

        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <form action="/apply" method="post">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Applicant Name</label>
                    <input type="text"
                           name="name"
                           class="form-control"
                           required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Institute Name</label>
                    <input type="text"
                           name="instituteName"
                           class="form-control"
                           required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Email ID</label>
                    <input type="email"
                           name="studentEmail"
                           class="form-control"
                           required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Contact Mobile Number</label>
                    <input type="text"
                           name="phone"
                           class="form-control"
                           required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Roll Number</label>
                    <input type="text"
                           name="rollNo"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Year of Study</label>
                    <input type="text"
                           name="year"
                           class="form-control"
                           required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Discipline / Branch</label>
                    <input type="text"
                           name="branch"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Date of Birth</label>
                    <input type="date"
                           name="dob"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Gender</label>
                    <select name="gender"
                            class="form-control">
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Father / Mother Name</label>
                    <input type="text"
                           name="parentName"
                           class="form-control">
                </div>

                <div class="col-md-12 mb-3">
                    <label>Address for Communication</label>
                    <textarea name="address"
                              class="form-control"
                              rows="3"></textarea>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Aadhaar Number</label>
                    <input type="text"
                           name="aadhaarNo"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Training Required</label>

                    <select name="course"
                            class="form-control">

                        <option>
                            Web Development
                        </option>

                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Duration</label>

                    <select name="duration"
                            class="form-control">

                        <option>1 Month</option>
                        <option>2 Months</option>
                        <option>3 Months</option>

                    </select>
                </div>

            </div>

            <div class="form-check mb-4">

                <input class="form-check-input"
                       type="checkbox"
                       required>

                <label class="form-check-label">

                    I certify that the above information is true
                    and correct to the best of my knowledge.

                </label>

            </div>

            <button type="submit"
                    class="btn btn-primary">

                Submit Application

            </button>

        </form>

    </div>

</div>

</body>
</html>
