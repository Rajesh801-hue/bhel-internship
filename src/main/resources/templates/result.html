<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Assessment Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4f6f9;">

<div class="container mt-5">

    <div class="card shadow p-4 text-center">

        <h2>Assessment Result</h2>

        <hr>

        <h3>
            Score:
            <span th:text="${score}"></span>/10
        </h3>

        <br>

        <h2>
            Result:
            <span th:text="${result}"></span>
        </h2>

        <br>

        <div th:if="${result == 'PASS'}">

            <div class="alert alert-success">
                Congratulations! You have successfully completed the internship assessment.
            </div>

            <a href="/certificate" class="btn btn-success">
                View Certificate
            </a>

        </div>

        <div th:if="${result == 'FAIL'}">

            <div class="alert alert-danger">
                You did not reach the passing score. Please try again.
            </div>

            <a href="/assessment" class="btn btn-primary">
                Retake Assessment
            </a>

        </div>

    </div>

</div>

</body>
</html>
